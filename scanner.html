<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupon Validator - Advertiser Portal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .hidden { display: none; }
        .error { color: red; border: 1px solid red; background: #ffe6e6; }
        .success { color: green; border: 1px solid green; background: #e6ffe6; }
        input { width: 90%; padding: 8px; margin: 10px 0; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginSection" class="box">
        <h2>🔐 Advertiser Scanner</h2>
        <p>Login with your store name</p>
        <input type="text" id="storeNameInput" placeholder="Enter Store Name (e.g. StoreA)">
        <button onclick="login()">🔓 Login</button>
        <p class="error" id="loginError"></p>
        <p><small>📌 How it works: You can only validate coupons from YOUR store.</small></p>
    </div>

    <!-- Validator Screen -->
    <div id="validatorSection" class="box hidden">
        <div class="header">
            <span>Store: <strong id="displayStoreName"></strong></span>
            <button onclick="logout()" style="font-size:0.8em">🚪 Logout</button>
        </div>
        <hr>
        <h3>📱 Coupon Validator</h3>
        <input type="text" id="scanInput" placeholder="Enter Coupon Code">
        <button onclick="validateCoupon()">✅ Validate</button>
        <button onclick="resetScan()">🔄 Reset</button>

        <div id="resultArea" class="hidden" style="margin-top: 20px;">
            <!-- Results injected here -->
        </div>
    </div>

    <script>
        let currentStoreName = "";

        function login() {
            const name = document.getElementById('storeNameInput').value.trim();
            if (!name) {
                document.getElementById('loginError').textContent = "Please enter a store name.";
                return;
            }
            currentStoreName = name;
            sessionStorage.setItem('validator_store', name);
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('validatorSection').classList.remove('hidden');
            document.getElementById('displayStoreName').textContent = name;
        }

        // Check session on load
        window.onload = function() {
            const stored = sessionStorage.getItem('validator_store');
            if (stored) {
                currentStoreName = stored;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('validatorSection').classList.remove('hidden');
                document.getElementById('displayStoreName').textContent = stored;
            }
        };

        function logout() {
            sessionStorage.removeItem('validator_store');
            location.reload();
        }

        function resetScan() {
            document.getElementById('scanInput').value = '';
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('resultArea').innerHTML = '';
        }

        function validateCoupon() {
            const code = document.getElementById('scanInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            resultArea.classList.remove('hidden');
            resultArea.innerHTML = '';

            // Get Database
            const db = JSON.parse(localStorage.getItem('coupon_database') || '[]');
            const coupon = db.find(c => c.code === code);

            if (!coupon) {
                resultArea.innerHTML = `
                    <div class="box error">
                        <h3>❌ Error</h3>
                        <p>Coupon code not found.</p>
                        <button onclick="resetScan()">Try Again</button>
                    </div>`;
                return;
            }

            // SECURITY CHECK: Compare Advertiser Name
            // The coupon's stored advertiserName MUST match the logged in storeName
            if (coupon.advertiserName !== currentStoreName) {
                resultArea.innerHTML = `
                    <div class="box error">
                        <h3>❌ ACCESS DENIED</h3>
                        <p>This coupon code belongs to another advertiser.</p>
                        <p><small>Expected: <strong>${coupon.advertiserName}</strong></small></p>
                        <p><small>You are logged in as: <strong>${currentStoreName}</strong></small></p>
                        <button onclick="resetScan()">Try Again</button>
                    </div>`;
                return;
            }

            // Check Expiry
            if (new Date(coupon.expiresAt) < new Date()) {
                resultArea.innerHTML = `
                    <div class="box error">
                        <h3>❌ EXPIRED</h3>
                        <p>This coupon has expired.</p>
                        <button onclick="resetScan()">Scan Another</button>
                    </div>`;
                return;
            }

            // Check Used Status
            if (coupon.used) {
                resultArea.innerHTML = `
                    <div class="box error">
                        <h3>⚠️ ALREADY REDEEMED</h3>
                        <p>This coupon has already been used.</p>
                        <p>Campaign: ${coupon.advertiserName}</p>
                        <button onclick="resetScan()">Scan Another</button>
                    </div>`;
                return;
            }

            // SUCCESS
            // Mark as used in DB
            coupon.used = true;
            localStorage.setItem('coupon_database', JSON.stringify(db));

            resultArea.innerHTML = `
                <div class="box success">
                    <h3>✅ VALID COUPON</h3>
                    <p>Campaign: ${coupon.advertiserName}</p>
                    <p>Product: ${coupon.product}</p>
                    <p>Location: ${coupon.location}</p>
                    <p>Expires: ${new Date(coupon.expiresAt).toLocaleDateString()}</p>
                    <button onclick="markAsUsedFinal()">✅ Mark as Used</button>
                    <button onclick="resetScan()">🔄 Scan Another</button>
                </div>`;
        }

        function markAsUsedFinal() {
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = `
                <div class="box success">
                    <h3>✅ VALIDATED!</h3>
                    <p>Coupon marked as used.</p>
                    <button onclick="resetScan()">Scan Another</button>
                </div>`;
        }
    </script>
</body>
</html>
