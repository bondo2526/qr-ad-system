<!DOCTYPE html>
<html>
<head>
    <title>Coupon Validator - Advertiser Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* Styles preserved from original */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 30px; max-width: 500px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #333; margin-bottom: 10px; text-align: center; font-size: clamp(28px, 6vw, 32px); }
        h2 { color: #333; margin: 20px 0 10px 0; text-align: center; font-size: clamp(22px, 5vw, 26px); }
        p { color: #666; margin: 10px 0; font-size: 16px; line-height: 1.6; text-align: center; }
        .result { margin: 20px 0; padding: 20px; border-radius: 10px; text-align: left; }
        .valid { background: #E8F5E9; border: 2px solid #4CAF50; }
        .invalid { background: #FFEBEE; border: 2px solid #F44336; }
        .coupon-display { font-size: 28px; font-weight: bold; font-family: 'Courier New', monospace; padding: 15px; background: #f9f9f9; border-radius: 8px; margin: 15px 0; text-align: center; word-break: break-all; }
        .info-item { margin: 12px 0; padding: 12px; background: #f8f9fa; border-radius: 8px; font-size: 15px; }
        .btn { padding: 14px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px 5px; font-size: 16px; min-height: 50px; flex: 1; }
        .btn-validate { background: #4CAF50; color: white; }
        .btn-mark-used { background: #2196F3; color: white; }
        .btn-reset { background: #9E9E9E; color: white; }
        .btn-login { background: #4CAF50; color: white; width: 100%; margin-top: 20px; }
        .btn-logout { background: #f44336; color: white; margin-top: 20px; }
        .hidden { display: none; }
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px; text-align: center; }
        .error-message { color: #f44336; margin: 10px 0; text-align: center; font-size: 15px; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .advertiser-info { background: #E8F5E9; border: 2px solid #4CAF50; border-radius: 10px; padding: 15px; margin: 20px 0; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection" class="login-section">
            <h1>🔐 Advertiser Scanner</h1>
            <p>Login to validate your specific coupons</p>
            <input type="text" id="advertiserId" placeholder="Your Advertiser ID (e.g., ph1)">
            <input type="password" id="advertiserPassword" placeholder="Password">
            <div class="error-message" id="loginError"></div>
            <button class="btn btn-login" onclick="login()">🔓 Login</button>
        </div>

        <div id="scannerSection" class="hidden">
            <h1>📱 Coupon Validator</h1>
            <div class="advertiser-info">
                <h3>Logged in as: <span id="currentAdvertiserId"></span></h3>
            </div>
            <input type="text" id="manualCode" placeholder="Enter coupon code" onkeypress="if(event.key==='Enter') validateManualCode()">
            <div class="action-buttons">
                <button class="btn btn-validate" onclick="validateManualCode()">✅ Validate</button>
                <button class="btn btn-logout" onclick="logout()">🚪 Logout</button>
            </div>
        </div>

        <div id="resultSection" class="hidden">
            <div class="coupon-display" id="scannedCoupon"></div>
            <div id="validResult" class="result valid hidden">
                <h2>✅ VALID COUPON</h2>
                <div class="info-item"><strong>Ad:</strong> <span id="resultAd"></span></div>
                <div class="info-item"><strong>Product:</strong> <span id="resultProduct"></span></div>
                <div class="action-buttons">
                    <button class="btn btn-mark-used" onclick="markCouponUsed()">✅ Mark as Used</button>
                    <button class="btn btn-reset" onclick="resetScanner()">🔄 Cancel</button>
                </div>
            </div>
            <div id="invalidResult" class="result invalid hidden">
                <h2 style="color: #F44336;">❌ INVALID</h2>
                <p id="invalidMessage"></p>
                <button class="btn btn-reset" onclick="resetScanner()">🔄 Try Again</button>
            </div>
        </div>
    </div>

    <script>
        // Replace with your Firebase config
        const firebaseConfig = { /* YOUR CONFIG HERE */ };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentAdvertiserId = null;
        let currentCouponData = null;
        let currentCouponDocId = null;

        async function login() {
            const id = document.getElementById('advertiserId').value.trim().toLowerCase();
            const pass = document.getElementById('advertiserPassword').value;
            if (!id || pass.length < 6) {
                document.getElementById('loginError').textContent = "Enter valid ID and password (min 6 chars).";
                return;
            }
            
            // Simulating advertiser lookup/creation
            currentAdvertiserId = id;
            document.getElementById('currentAdvertiserId').textContent = id;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('scannerSection').classList.remove('hidden');
        }

        async function validateManualCode() {
            const code = document.getElementById('manualCode').value.trim().toUpperCase();
            if (!code) return;

            try {
                const snapshot = await db.collection('claims')
                    .where('couponCode', '==', code)
                    .limit(1).get();

                if (snapshot.empty) {
                    showInvalid("❌ Code not found in database.");
                    return;
                }

                const doc = snapshot.docs[0];
                const data = doc.data();
                
                // === NEW ADVERTISER CHECK ===
                const couponAd = (data.adName || "").trim().toLowerCase();
                if (couponAd !== currentAdvertiserId) {
                    showInvalid(`⛔ PERMISSION DENIED: This coupon belongs to advertiser "${couponAd}". You are logged in as "${currentAdvertiserId}".`);
                    return;
                }
                // ============================

                if (data.redeemed) {
                    showInvalid("❌ This coupon has already been used.");
                    return;
                }

                currentCouponData = data;
                currentCouponDocId = doc.id;
                showValid(code, data);

            } catch (e) {
                showInvalid("Error: " + e.message);
            }
        }

        function showValid(code, data) {
            document.getElementById('scannerSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('scannedCoupon').textContent = code;
            document.getElementById('validResult').classList.remove('hidden');
            document.getElementById('resultAd').textContent = data.adName;
            document.getElementById('resultProduct').textContent = data.productName;
        }

        function showInvalid(msg) {
            document.getElementById('scannerSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('invalidResult').classList.remove('hidden');
            document.getElementById('invalidMessage').textContent = msg;
        }

        async function markCouponUsed() {
            await db.collection('claims').doc(currentCouponDocId).update({
                redeemed: true,
                redeemedAt: firebase.firestore.FieldValue.serverTimestamp(),
                redeemedBy: currentAdvertiserId
            });
            alert("Coupon successfully redeemed!");
            resetScanner();
        }

        function resetScanner() {
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('validResult').classList.add('hidden');
            document.getElementById('invalidResult').classList.add('hidden');
            document.getElementById('scannerSection').classList.remove('hidden');
            document.getElementById('manualCode').value = "";
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
